<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="description"
    content="一诺资产（YINO ASSET）是一家立足香港、放眼全球的综合性资产管理集团。我们专注于为高净值及超高净值客户提供包括财富管理、资产管理、家族办公室服务、证券及金融产品交易、投资咨询在内的一站式金融解决方案。深耕香港与新加坡金融市场，以持牌机构的专业根基立足，总部设立在新加坡，并在香港、杭州等地设有办公室，构建全球化服务网络。" />
  <meta name="keywords" content="一诺资产,YINO ASSET,家族办公室,资产管理,财富管理,全球资产配置,香港持牌机构,私人银行,家族信托,全球税务规划,投资咨询" />
  <title>YINO ASSET一诺资产</title>
</head>

<body>
  <div id="app">
    <!-- Initial Loading Screen -->
    <style>
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #f9fafb;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .loader-ring {
        width: 48px;
        height: 48px;
        border: 3px solid #e5e7eb;
        border-radius: 50%;
        border-top-color: #C5A059;
        /* yino-gold */
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }

      .loader-text {
        color: #6b7280;
        font-size: 14px;
        letter-spacing: 0.2em;
        font-weight: bold;
        text-transform: uppercase;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div class="initial-loader">
      <div class="loader-ring"></div>
      <div class="loader-text">YINO ASSET 一诺资产</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
